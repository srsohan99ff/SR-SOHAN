<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR SOHAN TOPUP SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0f19; color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .panel { background: #161b2c; padding: 30px; border-radius: 25px; border: 2px solid #00d2ff; text-align: center; width: 85%; box-shadow: 0 0 25px rgba(0, 210, 255, 0.3); }
        .user-name { font-size: 16px; color: #8a99b1; margin-bottom: 5px; }
        .balance-label { font-size: 12px; text-transform: uppercase; color: #5c6b81; letter-spacing: 1px; }
        .balance-amount { font-size: 45px; color: #00d2ff; font-weight: bold; margin: 10px 0; }
        .btn { background: linear-gradient(90deg, #00d2ff, #007bff); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 210, 255, 0.4); }
        .footer { font-size: 11px; color: #3d475c; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="panel">
        <div id="user-display" class="user-name">Loading...</div>
        <div class="balance-label">Available Balance</div>
        <div class="balance-amount">৳ <span id="balance">0</span></div>
        <button class="btn" onclick="orderDiamond()">BUY DIAMONDS</button>
        <div class="footer">SSC 2026 Special Edition | SR SOHAN</div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // ফুল স্ক্রিন করার জন্য

        // টেলিগ্রাম থেকে ইউজারের নাম নেওয়া
        let user = tg.initDataUnsafe?.user;
        if (user) {
            document.getElementById('user-display').innerText = "Hello, " + user.first_name + " 👋";
        }

        function orderDiamond() {
            tg.showConfirm("আপনি কি ডায়মন্ড কিনতে চান?", function(ok) {
                if(ok) {
                    tg.sendData("order_diamond");
                    tg.close();
                }
            });
        }
    </script>
</body>
</html>
