<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
        }
        
        .main-container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .main-logo-container {
            margin-bottom: 30px;
        }
        
        .main-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #1e293b;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.3);
            margin: 0 auto;
        }
        
        .main-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .dev-tag {
            font-size: 0.9rem;
            color: #94a3b8;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 15px;
            border-radius: 50px;
            margin-bottom: 40px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-family: 'Syncopate', sans-serif;
            font-size: 13px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* SVG লোগো স্টাইল */
        .btn-icon {
            width: 22px;
            height: 22px;
            margin-right: 10px;
            fill: white;
        }

        .full-width-btn {
            padding: 20px;
            font-size: 18px;
            letter-spacing: 2px;
        }

        .facebook { background: linear-gradient(45deg, #1d4ed8, #3b82f6); }
        .whatsapp { background: linear-gradient(45deg, #059669, #10b981); }
        .telegram { background: linear-gradient(45deg, #0284c7, #0ea5e9); }

        .contact-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="main-logo-container">
            <div class="main-logo">
                <img src="https://i.ibb.co/Rps0fz7F/image.jpg" alt="SR SOHAN">
            </div>
        </div>

        <h1 class="stylish-name">ᏚR SOHAN</h1>
        <div class="dev-tag">Developer & Admin</div>

        <div class="btn-container">
            <div class="row-grid">
                <a href="ফেসবুক_লিঙ্ক" class="contact-btn facebook" target="_blank">
                    <svg class="btn-icon" viewBox="0 0 24 24"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                    FACEBOOK
                </a>

                <a href="https://wa.me/নাম্বার" class="contact-btn whatsapp" target="_blank">
