<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght=700&family=Rajdhani:wght=600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --main-bg: #ffffff; /* নিখুঁত সাদা ফুল স্ক্রিন ব্যাকগ্রাউন্ড */
            --border-color: #e2e8f0;
            --text-dark: #000000;
            --text-gray: #64748b;
        }

        body {
            background-color: var(--main-bg);
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }
        
        /* ফুল স্ক্রিন কন্টেইনার (কোনো কার্ড বর্ডার বা ব্যাকগ্রাউন্ড শ্যাডো থাকবে না) */
        .main-container { 
            width: 100%; 
            max-width: 500px; /* মোবাইল স্ক্রিনের জন্য পারফেক্ট রেসপন্সিভ উইথ */
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: #ffffff;
        }

        /* ক্রিপ্টোমাসের মতো ক্লিন হেডার */
        .header-section {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 25px;
            padding-bottom: 10px;
        }
        
        .step-title { 
            font-size: 1.5rem; 
            font-weight: 700; 
            color: var(--text-dark); 
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 1px;
        }

        /* ৫00 USD অ্যামাউন্ট টেক্সট স্টাইল */
        .amount-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 12px;
            text-align: left;
        }

        /* ব্লু নেটওয়ার্ক ফি ট্যাগ */
        .info-tag {
            background: #eff6ff; 
            color: #2563eb; 
            padding: 6px 14px; 
            border-radius: 20px; 
            font-weight: 600;
            display: inline-flex; 
            align-items: center; 
            gap: 6px; 
            font-size: 0.9rem; 
            margin-bottom: 25px; 
            border: 1px solid #dbeafe;
            align-self: flex-start;
        }

        /* ড্রপডাউন লেবেল */
        .detail-label { 
            font-size: 1rem; 
            color: #000000; 
            font-weight: 700; 
            margin-bottom: 8px; 
            display: block; 
            text-align: left;
        }

        /* প্রধান স্ক্রিনের ইনপুট বক্স/ড্রপডাউন সিলেক্টর */
        .custom-dropdown {
            position: relative; 
            width: 100%; 
            margin-bottom: 20px; 
            user-select: none;
        }

        .dropdown-selected {
            background: #ffffff; 
            color: var(--text-dark); 
            padding: 16px; 
            border-radius: 14px;
            border: 1.5px solid var(--border-color); 
            font-weight: 600; 
            cursor: pointer;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            transition: 0.2s;
            font-size: 1.05rem;
        }
        .dropdown-selected:hover { border-color: #cbd5e1; }
        
        .dropdown-selected.custom-disabled { 
            opacity: 1 !important; 
            cursor: not-allowed !important;
            background: #f8fafc !important;
            color: #94a3b8 !important;
            border-color: #e2e8f0 !important;
        }

        .dropdown-selected::after {
            content: ""; 
            border-left: 5px solid transparent; 
            border-right: 5px solid transparent;
            border-top: 5px solid #000000; 
            transition: 0.3s; 
            margin-left: 10px;
        }
        .dropdown-selected.open::after { transform: rotate(180deg); }

        /* বটম মডাল ওভারলে */
        .dropdown-overlay {
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0, 0, 0, 0.4); 
            z-index: 200;
            align-items: flex-end; 
            justify-content: center;
        }
        
        /* পপ-আপ ড্রপডাউন শিট */
        .dropdown-sheet {
            background: #ffffff; 
            width: 100%; 
            max-width: 500px;
            border-top-left-radius: 28px; 
            border-top-right-radius: 28px;
            padding: 24px; 
            box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
            max-height: 85vh; 
            display: flex; 
            flex-direction: column;
            animation: slideUp 0.25s ease-out;
        }

        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .sheet-header {
            display: flex; 
            align-items: center; 
            justify-content: space-between;
            margin-bottom: 20px;
        }
        .sheet-title { font-size: 1.4rem; font-weight: 700; color: #000000; }
        
        .sheet-close-btn {
            background: none; border: none; cursor: pointer; padding: 4px; color: #000000;
            transition: transform 0.2s;
        }

        /* সার্চ বার */
        .search-container {
            position: relative; margin-bottom: 20px;
        }
        .search-input {
            width: 100%; background: #f1f5f9; border: none; padding: 14px 16px 14px 44px;
            border-radius: 14px; font-size: 1rem; color: #000; outline: none;
            font-weight: 600;
        }
        .search-input::placeholder { color: #94a3b8; font-weight: 500; }
        .search-icon {
            position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
            color: #94a3b8; pointer-events: none;
        }

        /* অপশন লিস্ট */
        .options-list-container {
            overflow-y: auto; flex-grow: 1; padding-bottom: 15px;
        }

        .dropdown-option {
            padding: 16px 8px; cursor: pointer; display: flex; align-items: center;
            justify-content: space-between; transition: 0.2s; color: #000000;
            font-weight: 600; font-size: 1.1rem; border-bottom: 1px solid #f1f5f9;
        }
        .dropdown-option:last-child { border-bottom: none; }
        .dropdown-option:hover { background: #f8fafc; }

        .option-left-content { display: flex; align-items: center; gap: 16px; }

        /* সবুজ পপুলার চয়েস ব্যাজ */
        .popular-badge {
            background: #e8f7ee; color: #10b981; font-size: 0.8rem; font-weight: 700;
            padding: 4px 12px; border-radius: 20px; letter-spacing: 0.3px;
        }

        .selected-value-container { display: flex; align-items: center; gap: 14px; width: 100%; font-size: 1rem; }
        .crypto-image-logo { width: 26px; height: 26px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }

        /* প্রধান প্রসিড বাটনটি একদম ফুল স্ক্রিনের নিচে সেট করার জন্য */
        .bottom-action-wrapper {
            margin-top: auto; /* এটিকে স্ক্রিনের একদম নিচে পুশ করবে */
            padding-top: 30px;
            padding-bottom: 10px;
        }

        .proceed-btn-style {
            padding: 16px 20px; border-radius: 14px; font-weight: 700; color: #8e949f; 
            width: 100%; display: flex; align-items: center; justify-content: center; background: #eeeeee; border: none;
            cursor: not-allowed; transition: all 0.2s ease; font-size: 1.1rem;
        }
        
        .proceed-btn-style.active {
            background: #000000; color: #fff; cursor: pointer; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
        }

        /* পেমেন্ট সাকসেস/ডিসপ্লে এরিয়া কন্টেন্ট */
        .payment-details-card {
            background: #ffffff; padding: 10px 0; border-radius: 14px; margin-top: 5px;
        }

        .detail-row { margin-bottom: 16px; }
        .detail-row:last-child { margin-bottom: 0; }
        
        .copy-field {
            background: #ffffff; border: 1.5px solid var(--border-color); padding: 14px; border-radius: 14px;
            display: flex; align-items: center; justify-content: space-between; font-family: monospace; font-size: 0.95rem; word-break: break-all; color: var(--text-dark);
        }

        .inline-copy-btn {
            display: flex; align-items: center; justify-content: center; color: #2563eb; background: #eff6ff; border: 1px solid #dbeafe;
            width: 36px; height: 36px; border-radius: 10px; cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .inline-copy-btn:hover { background: #dbeafe; }
        .inline-copy-btn.copied { background: #d1fae5 !important; border-color: #10b981 !important; color: #059669 !important; }

        .qr-box {
            margin: 10px auto 20px; width: 180px; height: 180px; background: white; padding: 10px; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05); border: 1px solid var(--border-color);
        }
        .qr-box img { width: 100% !important; height: 100% !important; object-fit: contain !important; }

        /* ফুটার সেকশন */
        .social-support-container { margin-top: 25px; text-align: center; border-top: 1px solid var(--border-color); padding-top: 20px; }
        .support-title { font-size: 0.9rem; font-weight: 700; color: var(--text-gray); margin-bottom: 16px; }
        .social-icons-row { display: flex; justify-content: center; gap: 16px; }
        
        .social-circle-btn {
            width: 44px; height: 44px; border-radius: 50%; background: #000000; display: flex; align-items: center; justify-content: center; color: #fff; transition: all 0.3s ease;
        }
        .social-circle-btn.telegram:hover { background: #0088cc; transform: translateY(-2px); }
        .social-circle-btn.whatsapp:hover { background: #22c55e; transform: translateY(-2px); }

        .btn-spinner {
            display: none; width: 22px; height: 22px; border: 3px solid rgba(0, 0, 0, 0.1); border-left-color: #000000; border-radius: 50%; animation: btnSpin 0.7s linear infinite;
        }
        .proceed-btn-style.active .btn-spinner { border-color: rgba(255,255,255,0.3); border-left-color: #fff; }
        @keyframes btnSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-notification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%); background: #ffffff; border: 1px solid #10b981; color: #000000;
            padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.95rem; display: flex; align-items: center; gap: 8px; z-index: 9999;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08); opacity: 0; transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
        .top-notification.show { top: 25px; opacity: 1; }
    </style>
</head>

        function openDropdownSheet(type) {

            currentSheetType = type;
            const overlay = document.getElementById('dropdownOverlay');
            const sheetTitle = document.getElementById('sheetTitle');
            const searchInput = document.getElementById('sheetSearchInput');
            
            searchInput.value = ""; 
            overlay.style.display = 'flex';
            
            if (type === 'currency') {
                sheetTitle.innerText = "Select currency";
            } else {
                sheetTitle.innerText = (selectedAsset === 'bKash' || selectedAsset === 'Nagad') ? "Select account type" : "Select network";
            }
            
            renderSheetOptions();
        }

        function closeDropdownSheet() {
            document.getElementById('dropdownOverlay').style.display = 'none';
        }

        function renderSheetOptions() {
            const container = document.getElementById('sheetOptionsList');
            container.innerHTML = "";
            
            if (currentSheetType === 'currency') {
                const currencies = ['bKash', 'Nagad', 'USDT', 'LTC'];
                currencies.forEach(asset => {
                    const item = document.createElement('div');
                    item.className = "dropdown-option";
                    item.innerHTML = `
                        <div class="option-left-content">
                            ${logos[asset]} <span>${asset}</span>
                        </div>
                    `;
                    item.onclick = () => selectAsset(asset);
                    container.appendChild(item);
                });
            } else if (currentSheetType === 'network') {
                const dataKey = selectedAsset.toLowerCase();
                if (walletData[dataKey]) {
                    walletData[dataKey].forEach((net, index) => {
                        const item = document.createElement('div');
                        item.className = "dropdown-option";
                        let badgeHTML = net.isPopular ? `<span class="popular-badge">Popular choice</span>` : '';
                        
                        item.innerHTML = `
                            <div class="option-left-content">
                                ${logos[net.logoKey]} <span>${net.name}</span>
                            </div>
                            ${badgeHTML}
                        `;
                        item.onclick = () => selectNetwork(index, net.name, net.logoKey);
                        container.appendChild(item);
                    });
                }
            }
        }

        function filterDropdownOptions() {
            const filter = document.getElementById('sheetSearchInput').value.toLowerCase();
            const options = document.getElementById('sheetOptionsList').getElementsByClassName('dropdown-option');
            
            for (let i = 0; i < options.length; i++) {
                const text = options[i].innerText || options[i].textContent;
                if (text.toLowerCase().indexOf(filter) > -1) {
                    options[i].style.display = "";
                } else {
                    options[i].style.display = "none";
                }
            }
        }

        function selectAsset(asset) {
            selectedAsset = asset;
            document.getElementById('assetSelected').innerHTML = `<div class="selected-value-container">${logos[asset]} <span style="color: var(--text-dark);">${asset}</span></div>`;
            closeDropdownSheet();

            const labelEl = document.getElementById('subSelectLabel');
            const placeholderText = (asset === 'bKash' || asset === 'Nagad') ? "Select Account" : "Select network";
            labelEl.innerText = (asset === 'bKash' || asset === 'Nagad') ? "Account Type" : "Network";

            const netSelected = document.getElementById('networkSelected');
            netSelected.classList.remove('custom-disabled');
            netSelected.innerHTML = `<span id="networkTextPlaceholder" style="color: var(--text-dark) !important; font-weight: 600;">${placeholderText}</span>`;
            
            selectedNetworkIndex = "";
            const btn = document.getElementById('proceedBtn');
            btn.disabled = true;
            btn.classList.remove('active');
        }

        function selectNetwork(index, name, logoKey) {
            selectedNetworkIndex = index;
            document.getElementById('networkSelected').innerHTML = `<div class="selected-value-container">${logos[logoKey]} <span style="color: var(--text-dark);">${name}</span></div>`;
            closeDropdownSheet();

            const btn = document.getElementById('proceedBtn');
            btn.disabled = false;
            btn.classList.add('active');
        }

        function startLoadingProcess() {
            if(selectedAsset === "" || selectedNetworkIndex === "") return;
            
            const btn = document.getElementById('proceedBtn');
            const loader = document.getElementById('btnLoader');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btn.classList.remove('active'); 
            
            btnText.innerText = ""; 
            loader.style.display = 'block';
            
            const dataKey = selectedAsset.toLowerCase();
            const netInfo = walletData[dataKey][selectedNetworkIndex];
            
            document.getElementById('networkLogo').innerHTML = logos[selectedAsset];
            document.getElementById('networkNameText').innerText = netInfo.name;
            document.getElementById('addrText').innerText = netInfo.address;
            document.getElementById('qrImage').src = netInfo.qr;

            const finalDataLabel = document.getElementById('finalDataLabel');
            if (selectedAsset === 'bKash' || selectedAsset === 'Nagad') {
                finalDataLabel.innerText = "Recipient's Number";
            } else {
                finalDataLabel.innerText = "Recipient's Wallet Address";
            }
            
            setTimeout(function() {
                // ১202.jpg স্ক্রিনশটের মতো অ্যামাউন্টের নিচে মেথড ও নেটওয়ার্ক টেক্সট ডাইনামিক করা
                document.getElementById('mainAmountLabel').innerHTML = `500 USD <br><span style="font-size: 1.15rem; color: #555; font-weight: 600;">500.00 ${selectedAsset} / Network · ${netInfo.name.split(' ')[0]}</span>`;
                
                document.getElementById('selectionArea').style.display = 'none';
                document.getElementById('displayArea').style.display = 'block';
                
                document.getElementById('actionButtons').innerHTML = `
                    <button onclick="resetToInitialState()" style="background: #000000; padding:16px 0; border-radius:14px; font-weight: 700; color: #fff; width: 100%; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.15); cursor: pointer; font-size: 1.1rem;">DONE</button>
                `;
            }, 2500);
        }

        function resetToInitialState() {
            selectedAsset = "";
            selectedNetworkIndex = "";
            document.getElementById('mainAmountLabel').innerText = "500 USD";
            document.getElementById('selectionArea').style.display = 'block';
            document.getElementById('subSelectLabel').innerText = "Network";
            document.getElementById('assetSelected').innerHTML = `<span class="selected-value-container" style="color: #64748b;">Select currency</span>`;
            
            const netBtn = document.getElementById('networkSelected');
            netBtn.innerHTML = `<span id="networkTextPlaceholder" style="color: #94a3b8;">Select network</span>`;
            netBtn.classList.add('custom-disabled');
            
            document.getElementById('displayArea').style.display = 'none';
            
            document.getElementById('actionButtons').innerHTML = `
                <button id="proceedBtn" onclick="startLoadingProcess()" class="proceed-btn-style" disabled>
                    <div id="btnLoader" class="btn-spinner"></div>
                    <span id="btnText">Proceed to the payment</span>
                </button>
            `;
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            
            const copyBtn = document.getElementById('copyBtnEl');
            const toast = document.getElementById('topToast');
            
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            
            toast.classList.add('show');
            
            setTimeout(function() {
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
