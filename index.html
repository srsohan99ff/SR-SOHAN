<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght=700&family=Rajdhani:wght=600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #2563eb;
            --dark-bg: #020617;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
        }

        body {
            background: radial-gradient(circle at top, #1e293b 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
        }
        
        .main-container { width: 100%; max-width: 400px; text-align: center; }

        .main-logo {
            width: 120px; height: 120px; border-radius: 50%; margin: 0 auto 20px;
            border: 3px solid var(--primary-blue);
            box-shadow: 0 0 25px rgba(37, 99, 235, 0.5);
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif; font-size: 1.6rem; letter-spacing: 4px; margin-bottom: 25px;
        }

        .btn-container { display: flex; flex-direction: column; gap: 12px; width: 100%; }

        .contact-btn {
            display: flex; align-items: center; justify-content: center;
            padding: 15px; border-radius: 12px; color: white; font-weight: 700;
            text-decoration: none; transition: 0.3s; border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .wallet-btn {
            background: linear-gradient(90deg, #2563eb, #1d4ed8);
            cursor: pointer; width: 100%; margin-top: 5px;
            box-shadow: 0 4px 15px rgba(37, 99, 235, 0.3);
        }

        /* গেটওয়ে মডাল */
        .modal {
            display: none; position: fixed; inset: 0; 
            background: rgba(2, 6, 23, 0.96); z-index: 100;
            align-items: center; justify-content: center; backdrop-filter: blur(12px);
        }

        .modal-content {
            background: #0f172a; width: 95%; max-width: 380px;
            padding: 22px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05);
            text-align: left; box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
        }

        .step-title { font-size: 1.4rem; font-weight: 700; margin-bottom: 5px; color: #fff; text-align: center; }

        /* ড্রপডাউন UI */
        .custom-dropdown {
            position: relative; width: 100%; margin-bottom: 15px; user-select: none;
        }

        .dropdown-selected {
            background: #0f172a; color: #fff; padding: 14px; border-radius: 12px;
            border: 1px solid var(--glass-border); font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: space-between; transition: 0.3s;
        }
        
        .dropdown-selected.custom-disabled { 
            opacity: 0.3 !important; 
            cursor: not-allowed !important;
            background: #090f24 !important;
            color: #64748b !important;
            border-color: rgba(255,255,255,0.02) !important;
        }

        .dropdown-selected::after {
            content: ""; border-left: 5px solid transparent; border-right: 5px solid transparent;
            border-top: 5px solid #94a3b8; transition: 0.3s; margin-left: 10px;
        }
        .dropdown-selected.open::after { transform: rotate(180deg); }

        .dropdown-options {
            display: none; position: absolute; top: 115%; left: 0; width: 100%;
            background: #020617; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;
            z-index: 99999; max-height: 220px; overflow-y: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            padding: 6px;
        }

        .dropdown-option {
            padding: 10px 12px; cursor: pointer; display: flex; align-items: center; gap: 14px;
            transition: 0.2s; color: #cbd5e1; font-weight: 600; border-radius: 8px;
        }
        .dropdown-option:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }

        .selected-value-container { display: flex; align-items: center; gap: 14px; width: 100%; }
        
        /* ড্রপডাউন এবং হেডার লোগো সাইজ */
        .crypto-image-logo {
            width: 24px; height: 24px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
        }

        .info-tag {
            background: rgba(59, 130, 246, 0.1); color: #60a5fa;
            padding: 6px 12px; border-radius: 8px; font-weight: 600;
            display: inline-flex; align-items: center; gap: 6px; font-size: 0.9rem; margin-bottom: 20px;
        }

        .proceed-btn-style {
            padding: 14px 20px; border-radius: 12px; font-weight: 700; color: #64748b; 
            width: 54%; display: flex; align-items: center; justify-content: center;
            background: #1e293b; border: 1px solid rgba(255,255,255,0.03);
            cursor: not-allowed; transition: all 0.3s ease; opacity: 0.6;
        }
        
        .proceed-btn-style.active {
            background: var(--primary-blue); color: #fff; cursor: pointer; opacity: 1;
            border-color: transparent; box-shadow: 0 4px 20px rgba(37, 99, 235, 0.4);
        }

        .payment-details-card {
            background: #020617; border: 1px dashed rgba(255,255,255,0.15);
            padding: 15px; border-radius: 14px; margin-top: 5px;
        }

        .detail-row { margin-bottom: 12px; }
        .detail-row:last-child { margin-bottom: 0; }
        .detail-label { font-size: 0.85rem; color: #94a3b8; font-weight: 600; margin-bottom: 4px; display: block; }
        
        .copy-field {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--glass-border);
            padding: 12px; border-radius: 12px; display: flex; align-items: center;
            justify-content: space-between; font-family: monospace; font-size: 0.85rem; word-break: break-all;
        }

        .inline-copy-btn {
            display: flex; align-items: center; justify-content: center;
            color: #60a5fa; background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            width: 34px; height: 34px; border-radius: 8px;
            cursor: pointer; transition: all 0.2s ease; flex-shrink: 0;
        }
        .inline-copy-btn:hover {
            background: rgba(59, 130, 246, 0.16); border-color: rgba(59, 130, 246, 0.4); color: #93c5fd;
        }
        
        .inline-copy-btn.copied {
            background: rgba(16, 185, 129, 0.15) !important;
            border-color: rgb(16, 185, 129) !important;
            color: rgb(16, 185, 129) !important;
        }

        /* কিউআর বক্সের জন্য ফিক্সড স্টাইল */
        .qr-box {
            margin: 5px auto 15px; width: 160px; height: 160px;
            background: white; padding: 10px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        
        .qr-box img {
            width: 100% !important; height: 100% !important; object-fit: contain !important;
            border-radius: 0% !important;
        }

        /* সোশ্যাল সাপোর্ট সেকশন (সবসময় নিচে দৃশ্যমান) */
        .social-support-container {
            margin-top: 20px; text-align: center; border-top: 1px solid rgba(255,255,255,0.05); padding-top: 15px;
        }
        .support-title { font-size: 0.95rem; font-weight: 700; color: #94a3b8; margin-bottom: 12px; letter-spacing: 1px; text-transform: uppercase; }
        .social-icons-row { display: flex; justify-content: center; gap: 16px; }
        
        .social-circle-btn {
            width: 44px; height: 44px; border-radius: 50%; background: #1e293b; 
            display: flex; align-items: center; justify-content: center; color: #fff;
            transition: all 0.3s ease; border: 1px solid rgba(255,255,255,0.05);
        }
        /* টেলিগ্রাম হোভার কালার */
        .social-circle-btn.telegram:hover { background: #0088cc; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0, 136, 204, 0.4); }
        /* হোয়াটসঅ্যাপ হোভার কালার */
        .social-circle-btn.whatsapp:hover { background: #22c55e; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4); }

        .btn-spinner {
            display: none; width: 22px; height: 22px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-left-color: #fff; border-radius: 50%;
            animation: btnSpin 0.7s linear infinite;
        }
        @keyframes btnSpin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-notification {
            position: fixed; top: -100px; left: 50%; transform: translateX(-50%);
            background: #0f172a; border: 1px solid #10b981; color: #ffffff;
            padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: 0.95rem;
            display: flex; align-items: center; gap: 8px; z-index: 9999;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6); opacity: 0;
            transition: top 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
        }
        
        .top-notification.show { top: 25px; opacity: 1; }
    </style>
</head>
<body>

        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        Copied successfully!
    </div>

    <div class="main-container">
        <div class="main-logo">
            <img src="https://i.ibb.co.com/Y409z5jC/logo.png" style="width:100%; height:100%; border-radius:50%;" alt="SR SOHAN">
        </div>

        <h1 class="stylish-name">ᏚR SOHAN</h1>

        <div class="btn-container">
            <div onclick="openWallet()" class="contact-btn wallet-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M21 18v1c0 1.105-.895 2-2 2H5c-1.105 0-2-.895-2-2V5c0-1.105.895-2 2-2h14c1.105 0 2 .895 2 2v1h-9c-1.105 0-2 .895-2 2v8c0 1.105.895 2 2 2h9zm-9-2h10V8H12v8zm4-2.5c-.828 0-1.5-.672-1.5-1.5s.672-1.5 1.5-1.5 1.5.672 1.5 1.5-.672 1.5-1.5 1.5z"/></svg>
                &nbsp;GET ADDRESS

        </div>
    </div>

    <div id="walletModal" class="modal">
        <div class="modal-content">
            <h2 class="step-title">ᏚR SOHAN PAY</h2>
            
            <div id="selectionArea">
                <div style="text-align: center;">
                    <div class="info-tag">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>
                        Select payment method
                    </div>
                </div>
                
                <label class="detail-label">Payment Method</label>
                <div class="custom-dropdown">
                    <div class="dropdown-selected" id="assetSelected" onclick="toggleDropdown('assetDropdownOptions', event)">
                        <span class="selected-value-container" style="color: #94a3b8;">Select Method</span>

                    <div class="dropdown-options" id="assetDropdownOptions"></div>
                </div>

                <label class="detail-label" id="subSelectLabel">Account Type / Network</label>
                <div class="custom-dropdown">
                    <div class="dropdown-selected custom-disabled" id="networkSelected" onclick="toggleDropdown('networkDropdownOptions', event)">
                        <span id="networkTextPlaceholder" style="color: #64748b; font-weight: 600;">Select Option</span>
                    </div>
                    <div class="dropdown-options" id="networkDropdownOptions"></div>
                </div>
            </div>

            <div id="displayArea" style="display: none;">
                <div class="payment-details-card">
                    
                    <div style="display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 15px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04);">
                        <span id="networkLogo"></span>
                        <span id="networkNameText" style="font-weight: 700; color: #60a5fa; font-size: 0.95rem;"></span>
                    </div>

                    <div class="detail-row">
                        <div class="qr-box">
                            <img id="qrImage" src="" alt="QR Code">
                        </div>
                    </div>

                    <div class="detail-row" style="margin-top: 10px;">
                        <span class="detail-label" id="finalDataLabel">Number / Address</span>
                        <div class="copy-field" style="margin-top: 6px;">
                            <span id="addrText" style="width: 82%; color: #e2e8f0;">LOADING...</span>
                            <span id="copyBtnEl" class="inline-copy-btn" onclick="copyText('addrText')">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>
                            </span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div id="actionButtons" style="margin-top: 20px; display: flex; justify-content: space-between; gap: 10px;">
                <button id="closeBtn" onclick="closeWallet()" style="border: 1px solid rgba(255,255,255,0.08); padding:10px 20px; border-radius:12px; font-weight: 600; color: #94a3b8; width: 40%; text-align: center;">Close</button>
                <button id="proceedBtn" onclick="startLoadingProcess()" class="proceed-btn-style" disabled>
                    <div id="btnLoader" class="btn-spinner"></div>
                    <span id="btnText">Proceed</span>
                </button>
            </div>

            <div class="social-support-container">
                <div class="support-title">SOHAN WALLETS</div>
                <div class="social-icons-row">
                    <a href="https://t.me/srsohan99ff" target="_blank" class="social-circle-btn telegram">
                        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.64 6.8c-.15 1.58-.8 5.42-1.13 7.19-.14.75-.42 1-.68 1.03-.58.05-1.02-.38-1.58-.75-.88-.58-1.38-.94-2.23-1.5-.99-.65-.35-1.01.22-1.59.15-.15 2.71-2.48 2.76-2.69a.2.2 0 0 0-.05-.18c-.06-.05-.14-.03-.21-.02-.09.02-1.49.95-4.22 2.79-.4.27-.76.41-1.08.4-.36-.01-1.04-.2-1.55-.37-.63-.2-1.12-.31-1.08-.66.02-.18.27-.36.74-.55 2.92-1.27 4.86-2.11 5.83-2.51 2.78-1.16 3.35-1.36 3.73-1.36.08 0 .27.02.39.12.1.08.13.19.14.27-.01.06.01.24 0 .38z"/>
                        </svg>
                    </a>
                    <a href="https://wa.me/8801329365319" target="_blank" class="social-circle-btn whatsapp">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.513 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.5-5.729-1.447L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.42 9.864-9.852.002-2.632-1.023-5.105-2.887-6.97C16.577 1.917 14.101.892 11.47.89 6.037.89 1.612 5.31 1.608 10.741c-.001 1.682.449 3.32 1.302 4.773L1.87 20.354l5.106-1.34c-.11.06-.21.11-.328.14zM17.65 14.4c-.32-.16-1.89-.93-2.185-1.04-.3-.11-.51-.16-.72.16-.21.32-.82 1.04-1.01 1.25-.19.21-.38.24-.7.08-.32-.16-1.35-.5-2.57-1.59-.95-.85-1.6-1.9-1.78-2.22-.19-.32-.02-.49.14-.65.15-.14.32-.37.48-.56.16-.18.21-.32.32-.53.11-.21.05-.4-.03-.56-.08-.16-.72-1.73-.99-2.37-.26-.64-.53-.55-.72-.56l-.61-.01c-.21 0-.56.08-.85.4-.3.32-1.15 1.13-1.15 2.75 0 1.62 1.18 3.19 1.35 3.41.17.22 2.33 3.56 5.65 5 .79.34 1.41.55 1.89.7.8.25 1.53.22 2.11.13.65-.1 1.89-.77 2.15-1.48.27-.71.27-1.32.19-1.45-.08-.14-.3-.22-.62-.38z"/></svg>
                    </a>

        </div>
    </div>

    <script>
        const logos = {
            bKash: `<img src="https://i.ibb.co.com/4g1Xr8BP/1164.jpg" class="crypto-image-logo" alt="bKash">`,
            Nagad: `<img src="https://i.ibb.co.com/ksqxHvm8/image.png" class="crypto-image-logo" alt="Nagad">`,
            USDT: `<img src="https://i.ibb.co.com/MDXfJt8R/1153.png" class="crypto-image-logo" alt="USDT">`,
            LTC: `<img src="https://i.ibb.co.com/S7J570W0/1154.png" class="crypto-image-logo" alt="LTC">`
        };

        const walletData = {
            bkash: [{ name: "Personal Account", logoKey: "bKash", address: "01329365319", qr: "https://i.ibb.co.com/4g1Xr8BP/1164.jpg" }],
            nagad: [{ name: "Personal Account", logoKey: "Nagad", address: "01329365319", qr: "https://i.ibb.co.com/ksqxHvm8/image.png" }],
            usdt: [
                { name: "BSC (BEP20)", logoKey: "USDT", address: "0x829f5ddbf2e7df26559a86c61837eb59fc491c13", qr: "https://i.ibb.co.com/ynCSX0Wf/1155.jpg" },
                { name: "TRX (TRC20)", logoKey: "USDT", address: "TY7NYcRGVyqG3ECNnRb7MqSZnKxDPyhx8L", qr: "https://i.ibb.co.com/VcZfSztd/image.png" }
            ],
            ltc: [{ name: "LTC (Litecoin)", logoKey: "LTC", address: "LRETuh12SFWUmXREKsUfELV1qgPqvcv854", qr: "https://i.ibb.co.com/HpzL6HLj/image.png" }]
        };

        let selectedAsset = "";
        let selectedNetworkIndex = "";

        function openWallet() {
            resetWalletModal(); // মডাল খোলার সাথে সাথেই আগে সব ক্লিন করবে
            document.getElementById('walletModal').style.display = 'flex';
            initAssetDropdown();
        }

        function closeWallet() {
            document.getElementById('walletModal').style.display = 'none';
        }

        function toggleDropdown(id, event) {
            if (event) event.stopPropagation();
            
            const assetOpts = document.getElementById('assetDropdownOptions');
            const netOpts = document.getElementById('networkDropdownOptions');
            const assetSel = document.getElementById('assetSelected');
            const netSel = document.getElementById('networkSelected');

            if (id === 'assetDropdownOptions') {
                netOpts.style.display = 'none';
                netSel.classList.remove('open');
                assetOpts.style.display = (assetOpts.style.display === 'block') ? 'none' : 'block';
                assetSel.classList.toggle('open');
            } else if (id === 'networkDropdownOptions') {
                if (netSel.classList.contains('custom-disabled')) return;
                assetOpts.style.display = 'none';
                assetSel.classList.remove('open');
                netOpts.style.display = (netOpts.style.display === 'block') ? 'none' : 'block';
                netSel.classList.toggle('open');
            }
        }

        function initAssetDropdown() {
            const container = document.getElementById('assetDropdownOptions');
            container.innerHTML = `
                <div class="dropdown-option" onclick="selectAsset('bKash', event)">${logos.bKash} <span>bKash</span></div>
                <div class="dropdown-option" onclick="selectAsset('Nagad', event)">${logos.Nagad} <span>Nagad</span></div>
                <div class="dropdown-option" onclick="selectAsset('USDT', event)">${logos.USDT} <span>USDT</span></div>
                <div class="dropdown-option" onclick="selectAsset('LTC', event)">${logos.LTC} <span>LTC</span></div>
            `;
        }

        function selectAsset(asset, event) {
            if (event) event.stopPropagation();
            
            selectedAsset = asset;
            document.getElementById('assetSelected').innerHTML = `<div class="selected-value-container">${logos[asset]} <span style="color: #fff;">${asset}</span></div>`;
            document.getElementById('assetDropdownOptions').style.display = 'none';
            document.getElementById('assetSelected').classList.remove('open');

            const labelEl = document.getElementById('subSelectLabel');
            const placeholderText = (asset === 'bKash' || asset === 'Nagad') ? "Select Account" : "Select Network";
            labelEl.innerText = (asset === 'bKash' || asset === 'Nagad') ? "Account Type" : "Select Network";

            const netSelected = document.getElementById('networkSelected');
            netSelected.classList.remove('custom-disabled');
            netSelected.innerHTML = `<span id="networkTextPlaceholder" style="color: #ffffff !important; font-weight: 600;">${placeholderText}</span>`;
            
            selectedNetworkIndex = "";
            const btn = document.getElementById('proceedBtn');
            btn.disabled = true;
            btn.classList.remove('active');

            const netContainer = document.getElementById('networkDropdownOptions');
            netContainer.innerHTML = "";
            
            const dataKey = asset.toLowerCase();
            if(walletData[dataKey]) {
                walletData[dataKey].forEach((net, index) => {
                    const item = document.createElement('div');
                    item.className = "dropdown-option";
                    item.innerHTML = `${logos[net.logoKey]} <span>${net.name}</span>`;
                    item.onclick = function(e) { 
                        e.stopPropagation();
                        selectNetwork(index, net.name, net.logoKey); 
                    };
                    netContainer.appendChild(item);
                });
            }
        }

        function selectNetwork(index, name, logoKey) {
            selectedNetworkIndex = index;
            document.getElementById('networkSelected').innerHTML = `<div class="selected-value-container">${logos[logoKey]} <span style="color: #fff;">${name}</span></div>`;
            document.getElementById('networkDropdownOptions').style.display = 'none';
            document.getElementById('networkSelected').classList.remove('open');

            const btn = document.getElementById('proceedBtn');
            btn.disabled = false;
            btn.classList.add('active');
        }

        function resetWalletModal() {
            selectedAsset = "";
            selectedNetworkIndex = "";
            document.getElementById('selectionArea').style.display = 'block';
            document.getElementById('subSelectLabel').innerText = "Account Type / Network";
            
            document.getElementById('assetSelected').innerHTML = `<span class="selected-value-container" style="color: #94a3b8;">Select Method</span>`;
            document.getElementById('assetSelected').classList.remove('open');
            
            const netBtn = document.getElementById('networkSelected');
            netBtn.innerHTML = `<span id="networkTextPlaceholder" style="color: #64748b;">Select Option</span>`;
            netBtn.classList.remove('open');
            netBtn.classList.add('custom-disabled');
            
            document.getElementById('displayArea').style.display = 'none';
            
            const actionArea = document.getElementById('actionButtons');
            actionArea.innerHTML = `
                <button id="closeBtn" onclick="closeWallet()" style="border: 1px solid rgba(255,255,255,0.08); padding:10px 20px; border-radius:12px; font-weight: 600; color: #94a3b8; width: 40%; text-align: center;">Close</button>
                <button id="proceedBtn" onclick="startLoadingProcess()" class="proceed-btn-style" disabled>
                    <div id="btnLoader" class="btn-spinner"></div>
                    <span id="btnText">Proceed</span>
                </button>
            `;
        }

        function startLoadingProcess() {
            if(selectedAsset === "" || selectedNetworkIndex === "") return;
            
            const btn = document.getElementById('proceedBtn');
            const loader = document.getElementById('btnLoader');
            const btnText = document.getElementById('btnText');
            const closeBtn = document.getElementById('closeBtn');
            
            btn.disabled = true;
            btn.classList.remove('active'); 
            closeBtn.disabled = true;
            closeBtn.style.opacity = "0.3";
            
            btnText.innerText = ""; 
            loader.style.display = 'block';
            
            const dataKey = selectedAsset.toLowerCase();
            const netInfo = walletData[dataKey][selectedNetworkIndex];
            
            document.getElementById('networkLogo').innerHTML = logos[selectedAsset];
            document.getElementById('networkNameText').innerText = netInfo.name;
            document.getElementById('addrText').innerText = netInfo.address;
            document.getElementById('qrImage').src = netInfo.qr;

            const finalDataLabel = document.getElementById('finalDataLabel');
            if (selectedAsset === 'bKash' || selectedAsset === 'Nagad') {
                finalDataLabel.innerText = "Recipient's Number";
            } else {
                finalDataLabel.innerText = "Recipient's Wallet Address";
            }
            
            setTimeout(function() {
                document.getElementById('selectionArea').style.display = 'none';
                document.getElementById('displayArea').style.display = 'block';
                
                document.getElementById('actionButtons').innerHTML = `
                    <button onclick="closeWallet()" style="background: var(--primary-blue); padding:14px 0; border-radius:12px; font-weight: 700; color: #fff; width: 100%; text-align: center; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.45);">DONE</button>
                `;
            }, 2500);
        }

        window.onclick = function(event) {
            if (!event.target.closest('.custom-dropdown')) {
                document.getElementById('assetDropdownOptions').style.display = 'none';
                document.getElementById('networkDropdownOptions').style.display = 'none';
                document.getElementById('assetSelected').classList.remove('open');
                document.getElementById('networkSelected').classList.remove('open');
            }
        }

        function copyText(elementId) {
            const text = document.getElementById(elementId).innerText;
            navigator.clipboard.writeText(text);
            
            const copyBtn = document.getElementById('copyBtnEl');
            const toast = document.getElementById('topToast');
            
            copyBtn.classList.add('copied');
            copyBtn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>`;
            
            toast.classList.add('show');
            
            setTimeout(function() {
                copyBtn.classList.remove('copied');
                copyBtn.innerHTML = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>`;
                toast.classList.remove('show');
            }, 2000);
        }
    </script>
</body>
</html>
