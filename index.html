<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR SOHAN - Smart Panel</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #050a18; color: white; font-family: 'Rajdhani', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .support-card { width: 95%; max-width: 400px; background: rgba(255, 255, 255, 0.05); padding: 30px; border-radius: 25px; border: 1px solid rgba(59, 130, 246, 0.3); backdrop-filter: blur(15px); box-shadow: 0 20px 40px rgba(0,0,0,0.6); }
        h1 { font-family: 'Syncopate', sans-serif; font-size: 16px; margin-bottom: 25px; text-shadow: 0 0 15px rgba(59, 130, 246, 0.6); text-align: center; }
        .form-group { text-align: left; margin-bottom: 15px; }
        label { color: #94a3b8; font-size: 11px; display: block; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; color: white; border: 1px solid #3b82f6; outline: none; font-size: 15px; }
        .dynamic-fields { display: none; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .submit-btn { width: 100%; padding: 15px; border-radius: 12px; color: white; font-family: 'Syncopate', sans-serif; font-size: 11px; border: none; cursor: pointer; font-weight: bold; margin-top: 10px; transition: 0.4s; }
        .report-btn { background: linear-gradient(45deg, #1d4ed8, #3b82f6); }
        .order-btn { background: linear-gradient(45deg, #10b981, #059669); }
        .swal2-popup { background: #0f172a !important; color: white !important; border: 1px solid #3b82f6 !important; }
    </style>
</head>
<body>

<div class="support-card">
    <h1>ᏚR SOHAN PANEL</h1>

    <div class="form-group">
        <label>Your Chat ID:</label>
        <input type="text" id="userChatId" placeholder="Enter Chat ID first">
    </div>

    <div class="form-group">
        <label>Select Issue (Optional for Order check):</label>
        <select id="userIssue" onchange="updateFields()">
            <option value="">-- Choose Issue --</option>
            <option value="Payment">Payment Problem</option>
            <option value="Order">Order Problem</option>
            <option value="Ban">Ban Problem</option>
        </select>
    </div>

    <div id="paymentFields" class="dynamic-fields">
        <div class="form-group"><label>Method:</label><select id="payMethod"><option value="Bkash">Bkash</option><option value="Nagad">Nagad</option></select></div>
        <div class="form-group"><label>Transaction ID:</label><input type="text" id="trxId" placeholder="TrxID"></div>
    </div>

    <div id="orderFields" class="dynamic-fields">
        <div class="form-group"><label>Order ID:</label><input type="text" id="orderId" placeholder="Order ID"></div>
    </div>

    <button class="submit-btn report-btn" onclick="sendReport()">SUBMIT REPORT ➔</button>
    <button class="submit-btn order-btn" onclick="checkMyOrder()">MY ORDER 🔍</button>
</div>

<script>
    function updateFields() {
        const issue = document.getElementById("userIssue").value;
        document.getElementById("paymentFields").style.display = (issue === "Payment") ? "block" : "none";
        document.getElementById("orderFields").style.display = (issue === "Order") ? "block" : "none";
    }

    function checkMyOrder() {
        const id = document.getElementById("userChatId").value;
        if(!id) return Swal.fire({ icon: 'warning', text: 'অর্ডার দেখতে আগে Chat ID দিন!' });

        // প্রপার্টি গেট করার নিখুঁত লজিক: order_history + ইউজার আইডি
        const propName = "order_history" + id;
        let orderData = BB.getProperty(propName); 

        if(orderData) {
            Swal.fire({ 
                title: 'Order History', 
                html: `<div style="text-align:left; font-size:14px; color: #fff;">${orderData}</div>`, 
                icon: 'success' 
            });
        } else {
            Swal.fire({ 
                icon: 'error', 
                title: 'Not Found', 
                text: 'এই আইডিতে কোনো তথ্য পাওয়া যায়নি। (প্রপার্টি: ' + propName + ')' 
            });
        }
    }

    function sendReport() {
        const issue = document.getElementById("userIssue").value;
        const id = document.getElementById("userChatId").value;
        if(!issue || !id) return Swal.fire({ icon: 'warning', text: 'সমস্যা এবং Chat ID—দুটোই দিন!' });

        BB.runCommand("/report " + issue + " " + id); 
        Swal.fire({ icon: 'success', text: 'রিপোর্ট পাঠানো হয়েছে!' });
    }
</script>
</body>
</html>
