<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ᏚR SOHAN - Official</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/dist/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            font-family: 'Rajdhani', sans-serif;
            color: #f9fafb;
        }
        
        .main-container {
            width: 100%;
            max-width: 420px;
            text-align: center;
        }

        .main-logo-container {
            margin-bottom: 30px;
        }
        
        .main-logo {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            overflow: hidden;
            border: 4px solid #1e293b;
            box-shadow: 0 0 25px rgba(59, 130, 246, 0.2);
            margin: 0 auto;
        }
        
        .main-logo img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .stylish-name {
            font-family: 'Syncopate', sans-serif;
            font-size: 1.8rem;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .dev-tag {
            font-size: 0.9rem;
            color: #94a3b8;
            background-color: rgba(255, 255, 255, 0.05);
            padding: 4px 15px;
            border-radius: 50px;
            margin-bottom: 40px;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .contact-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 14px;
            color: white;
            font-family: 'Syncopate', sans-serif;
            font-size: 14px;
            text-decoration: none;
            text-transform: uppercase;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* আইকন স্টাইল */
        .contact-btn i {
            font-size: 24px; /* আইকন বড় করা হয়েছে */
            margin-right: 12px; /* টেক্সট থেকে দূরত্ব */
        }

        .full-width-btn {
            padding: 22px;
            font-size: 18px;
            letter-spacing: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .facebook { background: linear-gradient(45deg, #1d4ed8, #3b82f6); }
        .whatsapp { background: linear-gradient(45deg, #059669, #10b981); }
        .telegram { background: linear-gradient(45deg, #0284c7, #0ea5e9); }

        .contact-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="main-logo-container">
            <div class="main-logo">
                <img src="https://i.ibb.co/Rps0fz7F/image.jpg" alt="SR SOHAN">
            </div>
        </div>

        <h1 class="stylish-name">ᏚR SOHAN</h1>
        <div class="dev-tag">Developer & Admin</div>

        <div class="btn-container">
            <div class="row-grid">
                <a href="ফেসবুক_লিঙ্ক" class="contact-btn facebook" target="_blank">
                    <i class="fab fa-facebook"></i> FACEBOOK
                </a>

                <a href="https://wa.me/নাম্বার" class="contact-btn whatsapp" target="_blank">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
            </div>

            <a href="https://t.me/ইউজারনেম" class="contact-btn telegram full-width-btn" target="_blank">
                <i class="fab fa-telegram"></i> TELEGRAM
            </a>
        </div>
    </div>

</body>
</html>
