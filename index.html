<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SR SOHAN - Official Support</title>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #050a18; /* ডার্ক থিম */
            color: white;
            font-family: 'Rajdhani', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* মেইন কন্টেইনার */
        .support-card {
            width: 90%;
            max-width: 380px;
            background: rgba(255, 255, 255, 0.05);
            padding: 35px 25px;
            border-radius: 30px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            backdrop-filter: blur(15px);
            position: relative;
        }

        h1 {
            font-family: 'Syncopate', sans-serif;
            font-size: 18px;
            color: #ffffff;
            margin-bottom: 30px;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 15px rgba(59, 130, 246, 0.6);
        }

        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }

        label {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 8px;
            display: block;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* ড্রপডাউন এবং ইনপুট স্টাইল */
        select, input {
            width: 100%;
            padding: 15px;
            border-radius: 12px;
            background: #0f172a;
            color: white;
            border: 1px solid #3b82f6;
            font-family: 'Rajdhani', sans-serif;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        select:focus, input:focus {
            border-color: #60a5fa;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.4);
        }

        /* সাবমিট বাটন */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border-radius: 15px;
            background: linear-gradient(45deg, #1d4ed8, #3b82f6);
            color: white;
            font-family: 'Syncopate', sans-serif;
            font-size: 12px;
            border: none;
            cursor: pointer;
            font-weight: bold;
            transition: 0.4s;
            margin-top: 10px;
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.4);
            text-transform: uppercase;
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(59, 130, 246, 0.6);
            filter: brightness(1.1);
        }

        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: #475569;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="support-card">
    <h1>ᏚR SOHAN INFO</h1>

    <div class="form-group">
        <label>Select Your Issue:</label>
        <select id="userIssue">
            <option value="">-- Choose an Option --</option>
            <option value="Payment Problem">Payment Problem</option>
            <option value="Login Issue">Login Issue</option>
            <option value="Diamond Top-up Issue">Diamond Top-up Issue</option>
            <option value="Admin Support">Admin Support</option>
            <option value="Others">Others</option>
        </select>
    </div>

    <div class="form-group">
        <label>Your ID or Number:</label>
        <input type="text" id="userIdentifier" placeholder="Type here...">
    </div>

    <button class="submit-btn" onclick="processSupport()">Submit Info ➔</button>

    <div class="footer">POWERED BY SR SOHAN SUPPORT SYSTEM</div>
</div>

<script>
    function processSupport() {
        var issue = document.getElementById("userIssue").value;
        var info = document.getElementById("userIdentifier").value;
        var myTelegram = "SrSohan99ff"; // তোমার টেলিগ্রাম আইডি

        if (issue === "" || info === "") {
            alert("Please select an issue and provide your details!");
            return;
        }

        // মেসেজ ফরম্যাট
        var message = "🆘 **New Support Request**\n\n" +
                      "📌 Issue: " + issue + "\n" +
                      "🔑 Data: " + info + "\n" +
                      "🌐 Source: Website Support";

        // টেলিগ্রামে রিডাইরেক্ট লিঙ্ক
        var finalUrl = "https://t.me/" + myTelegram + "?text=" + encodeURIComponent(message);
        
        // নতুন ট্যাবে টেলিগ্রাম ওপেন হবে
        window.open(finalUrl, '_blank');
    }
</script>

</body>
</html>
